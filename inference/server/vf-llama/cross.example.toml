# Example cross-compilation settings for Jetson (Orin Nano).
# Copy to .cargo/config.toml or merge into inference/server/.cargo/config.toml.
#
# Prerequisites:
#   1. Build llama.cpp for aarch64 with GGML_CUDA=ON on device or in sysroot.
#   2. Export LLAMA_LIB_DIR / LLAMA_INCLUDE_DIR before `cargo build`.
#
# [target.aarch64-unknown-linux-gnu]
# linker = "aarch64-linux-gnu-gcc"
# rustflags = [
#   "-C", "link-arg=-Wl,-rpath,/usr/local/cuda/lib64",
# ]
